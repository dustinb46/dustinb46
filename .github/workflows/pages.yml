name: Deploy brief to GitHub Pages

on:
  push:
    branches:
      - claude/beautiful-hamilton-couhdl
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  enable-pages-from-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages (classic, deploy from this branch)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -e
          body="{\"source\":{\"branch\":\"${BRANCH}\",\"path\":\"/\"},\"build_type\":\"legacy\"}"
          echo "Configuring Pages for $REPO from branch $BRANCH"

          # Try to create the Pages site.
          create=$(curl -sS -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages" \
            -d "${body}")
          create_code=$(echo "$create" | tail -n1)
          echo "Create response ($create_code):"
          echo "$create" | sed '$d'

          # If it already exists (409), update the source instead.
          if [ "$create_code" = "409" ]; then
            echo "Site exists; updating source via PUT."
            put=$(curl -sS -w "\n%{http_code}" -X PUT \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPO}/pages" \
              -d "${body}")
            put_code=$(echo "$put" | tail -n1)
            echo "Update response ($put_code):"
            echo "$put" | sed '$d'
            case "$put_code" in 200|204) ;; *) echo "PUT failed"; exit 1;; esac
          else
            case "$create_code" in 201|202) ;; *) echo "POST failed"; exit 1;; esac
          fi

          # Show resolved Pages info (including the public URL).
          echo "Final Pages config:"
          curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pages"
